<div class="login-wrapper">

  <div class="login-card">
    <h1 class="heading">Welcome back</h1>
    <p class="subheading">Sign in to continue to your community</p>

    <!-- Errors -->
    <div class="errors" *ngIf="errors?.length">
      <div class="error-item" *ngFor="let e of errors">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="#f87171" stroke-width="1.5"/>
          <path d="M7 4v3M7 9.5v.5" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        {{ e }}
      </div>
    </div>

    <form #f="ngForm" (ngSubmit)="submit(f)" class="login-form" novalidate>

      <!-- <div class="field-group"> -->
        <label class="field-label" for="userName">Username</label>
        <div class="field-wrap">
          <svg class="field-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2.5 13c0-2.485 2.462-4.5 5.5-4.5s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="userName"
            name="userName"
            [(ngModel)]="model.userName"
            required
            class="field-input"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>

      <div class="field-group">
        <div class="field-label-row">
          <label class="field-label" for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="field-wrap">
          <svg class="field-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="password"
            name="password"
            [(ngModel)]="model.password"
            required
            type="password"
            class="field-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
      </div>

      <div class="remember-row">
        <label class="checkbox-label">
          <input
            name="rememberMe"
            [(ngModel)]="model.rememberMe"
            type="checkbox"
            class="checkbox-input"
          />
          <span class="checkbox-custom"></span>
          <span class="checkbox-text">Keep me signed in</span>
        </label>
      </div>

      <button type="submit" class="btn-submit">
        Sign In
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </form>

    <p class="signup-prompt">
      Don't have an account? <a class="signup-link" routerLink="/register">Create one</a>
    </p>
  </div>
</div>
